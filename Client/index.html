<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/dm-fieldapp-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4B257A" />
    <title>Decal Monkey Field App</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 20% 0%, #4b257a, #12081f 70%);
        color: white;
        overflow-y: auto;
      }

      #app-shell {
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
        overflow: visible;
      }

      .dm-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        background: transparent;
        pointer-events: none;
        z-index: 1;
      }

      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top: 3px solid #9f6bff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="app-shell">
      <div id="root"></div>

      <div class="dm-loading" id="dm-loading">
        <div class="spinner"></div>
        <div>Loading field tools…</div>
      </div>
    </div>

    <script>
      const rootEl = document.getElementById("root");
      const loadingEl = document.getElementById("dm-loading");

      const observer = new MutationObserver(() => {
        if (rootEl && rootEl.children.length > 0) {
          loadingEl?.remove();
          observer.disconnect();
        }
      });

      if (rootEl) {
        observer.observe(rootEl, { childList: true });
      }

      window.addEventListener("load", () => {
        setTimeout(() => {
          if (rootEl && rootEl.children.length > 0) {
            loadingEl?.remove();
            observer.disconnect();
          }
        }, 1200);
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
